<script>
document.addEventListener('DOMContentLoaded', async () => {
    const config = await loadConfig();

    if (isAdmin()) {
        document.getElementById('dashboard-view').classList.remove('hidden');
        loadDashboardList();
        
        document.getElementById('logout-btn').onclick = () => {
            sessionStorage.removeItem('isAdmin');
            window.location.reload();
        };
    } else {
        document.getElementById('login-view').classList.remove('hidden');
        
        document.getElementById('login-form').onsubmit = (e) => {
            e.preventDefault();
            const passwordInput = document.getElementById('password').value;
            const errorDiv = document.getElementById('login-error');
            errorDiv.classList.add('hidden');

            if (passwordInput === config.admin_password) {
                sessionStorage.setItem('isAdmin', 'true');
                window.location.reload();
            } else {
                errorDiv.innerText = "비밀번호가 올바르지 않습니다.";
                errorDiv.classList.remove('hidden');
            }
        };
    }
    // Mobile Drawer Toggle
    const toggleBtn = document.getElementById('mobile-menu-toggle');
    const drawer = document.getElementById('mobile-drawer');
    const drawerClose = document.getElementById('mobile-drawer-close');
    const drawerContent = drawer ? drawer.querySelector('.transform') : null;

    if (toggleBtn && drawer && drawerClose && drawerContent) {
      const openDrawer = () => {
        drawer.classList.remove('hidden');
        setTimeout(() => {
          drawer.classList.remove('opacity-0');
          drawerContent.classList.remove('translate-x-full');
        }, 10);
      };
      const closeDrawer = () => {
        drawer.classList.add('opacity-0');
        drawerContent.classList.add('translate-x-full');
        setTimeout(() => {
          drawer.classList.add('hidden');
        }, 300);
      };
      toggleBtn.addEventListener('click', openDrawer);
      drawerClose.addEventListener('click', closeDrawer);
      drawer.addEventListener('click', (e) => {
        if (e.target === drawer) closeDrawer();
      });
    }
});

async function loadDashboardList() {
    const tbody = document.getElementById('posts-tbody');
    const emptyDiv = document.getElementById('empty-dashboard');
    tbody.innerHTML = '<tr><td colspan="5" class="text-center py-lg text-muted">불러오는 중...</td></tr>';
    
    try {
        const posts = await getPosts();
        if (!posts || posts.length === 0) {
            tbody.innerHTML = '';
            emptyDiv.classList.remove('hidden');
            return;
        }

        emptyDiv.classList.add('hidden');
        tbody.innerHTML = posts.map((post, idx) => {
            return `
                <tr class="hover:bg-surface-container-low transition-colors text-ink">
                    <td class="px-lg py-4 text-center font-medium text-muted">${posts.length - idx}</td>
                    <td class="px-lg py-4 font-semibold text-xs text-muted">${post.category || '일반'}</td>
                    <td class="px-lg py-4 font-semibold text-primary hover:underline cursor-pointer" onclick="location.href='news-detail.html?id=${post.id}'">${post.title}</td>
                    <td class="px-lg py-4 text-muted font-medium text-xs">${post.date}</td>
                    <td class="px-lg py-4 text-center">
                        <div class="flex items-center justify-center gap-sm">
                            <a href="news-write.html?id=${post.id}" class="bg-surface-container-high hover:bg-surface-dim px-3 py-1.5 rounded text-xs font-semibold flex items-center gap-xs">
                                <span class="material-symbols-outlined text-[14px]">edit</span> 수정
                            </a>
                            <button onclick="handleDelete('${post.id}')" class="bg-error-container hover:bg-error/20 text-error px-3 py-1.5 rounded text-xs font-semibold flex items-center gap-xs">
                                <span class="material-symbols-outlined text-[14px]">delete</span> 삭제
                            </button>
                        </div>
                    </td>
                </tr>
            `;
        }).join('');
    } catch (e) {
        console.error("Dashboard list error:", e);
        tbody.innerHTML = `<tr><td colspan="5" class="text-center py-lg text-error">불러오는데 실패했습니다: ${e.message}</td></tr>`;
    }
}

async function handleDelete(id) {
    if (confirm("정말로 이 소식을 삭제하시겠습니까?")) {
        try {
            await deletePost(id);
            alert("삭제되었습니다.");
            loadDashboardList();
        } catch (e) {
            alert("삭제 실패: " + e.message);
        }
    }
}
