<script>
document.addEventListener('DOMContentLoaded', async () => {
    // 1. Setup Mobile Menu Drawer
    const toggleBtn = document.getElementById('mobile-menu-toggle');
    const drawer = document.getElementById('mobile-drawer');
    const drawerClose = document.getElementById('mobile-drawer-close');
    const drawerContent = drawer ? drawer.querySelector('.transform') : null;

    if (toggleBtn && drawer && drawerClose && drawerContent) {
        const openDrawer = () => {
            drawer.classList.remove('hidden');
            setTimeout(() => {
                drawer.classList.remove('opacity-0');
                drawerContent.classList.remove('translate-x-full');
            }, 10);
        };
        const closeDrawer = () => {
            drawer.classList.add('opacity-0');
            drawerContent.classList.add('translate-x-full');
            setTimeout(() => {
                drawer.classList.add('hidden');
            }, 300);
        };
        toggleBtn.addEventListener('click', openDrawer);
        drawerClose.addEventListener('click', closeDrawer);
        drawer.addEventListener('click', (e) => {
            if (e.target === drawer) closeDrawer();
        });
    }

    // 2. Setup Mobile View Panel Toggling
    const listPanel = document.getElementById('list-panel');
    const mapPanel = document.getElementById('map-panel');
    const mobileToMapBtn = document.getElementById('mobile-to-map-btn');
    const mobileToListBtn = document.getElementById('mobile-to-list-btn');

    mobileToMapBtn.addEventListener('click', () => {
        listPanel.classList.add('hidden');
        mapPanel.classList.remove('hidden');
        if (editorMap) {
            setTimeout(() => {
                editorMap.invalidateSize();
                if (activeProperties && activeProperties.length > 0) {
                    if (activeProperties.length === 1) {
                        editorMap.setView(activeProperties[0].coordinates, 15);
                    } else {
                        const bounds = L.latLngBounds(activeProperties.map(p => p.coordinates));
                        editorMap.fitBounds(bounds, { padding: [50, 50] });
                    }
                }
            }, 150);
        }
    });

    mobileToListBtn.addEventListener('click', () => {
        mapPanel.classList.add('hidden');
        listPanel.classList.remove('hidden');
    });

    // 3. Initialize Leaflet Map
    const editorMap = L.map('map', {
        zoomControl: true,
        scrollWheelZoom: true
    }).setView([35.8714, 128.6014], 13); // Default Daegu Center

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(editorMap);

    // Beautiful premium custom divIcon
    const customMarkerHtml = `
        <div class="flex items-center justify-center w-8 h-8 rounded-full bg-primary text-white border-2 border-white shadow-strong-elevated hover:bg-blue-mid transition-all duration-300">
            <span class="material-symbols-outlined text-[18px]">home</span>
        </div>
    `;
    const customIcon = L.divIcon({
        html: customMarkerHtml,
        className: '',
        iconSize: [32, 32],
        iconAnchor: [16, 16]
    });

    // 4. Fetch & Process Properties data
    let allProperties = [];
    let activeProperties = [];
    let markersMap = new Map(); // Keep track of Leaflet markers by post id

    // Helper: Geocoding fallback
    async function geocodeAddress(address) {
        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}`);
            if (res.ok) {
                const data = await res.json();
                if (data && data.length > 0) {
                    return [parseFloat(data[0].lat), parseFloat(data[0].lon)];
                }
            }
        } catch (e) {
            console.error("Geocoding failed: ", e);
        }
        return null;
    }

    // Helper: extract details from markdown content
    function parsePropertyDetails(content) {
        const details = {
            price: "보증금/월세 협의",
            area: "면적 정보 없음",
            parking: "주차 정보 없음"
        };
        
        const lines = content.split('\n');
        let bo = "";
        let wol = "";
        let maemae = "";
        let daeji = "";
        let jeonyong = "";
        
        lines.forEach(line => {
            const trimmed = line.trim();
            if (trimmed.startsWith('▶') || trimmed.startsWith('O') || trimmed.startsWith('★')) {
                const match = trimmed.match(/[▶O★]\s*(.*?)\s*:\s*(.*)/);
                if (match) {
                    const key = match[1].trim();
                    const val = match[2].trim();
                    if (key.includes("보증금")) {
                        bo = val;
                    } else if (key.includes("월세")) {
                        wol = val;
                    } else if (key.includes("매매가") || key.includes("매매가격")) {
                        maemae = val;
                    } else if (key.includes("대지면적")) {
                        daeji = val;
                    } else if (key.includes("전용면적")) {
                        jeonyong = val;
                    } else if (key.includes("면적")) {
                        if (!jeonyong) jeonyong = val;
                    } else if (key.includes("주차")) {
                        details.parking = val;
                    }
                }
            }
        });
        
        if (maemae) {
            details.price = `매매 ${maemae}`;
            if (daeji && jeonyong) {
                const cleanDaeji = daeji.replace(/약\s*/g, '');
                const cleanJeonyong = jeonyong.replace(/약\s*/g, '');
                details.area = `대지 ${cleanDaeji} / 건물전용 ${cleanJeonyong}`;
            } else if (daeji) {
                details.area = `대지 ${daeji.replace(/약\s*/g, '')}`;
            } else if (jeonyong) {
                details.area = `건물전용 ${jeonyong.replace(/약\s*/g, '')}`;
            }
        } else {
            if (bo || wol) {
                if (bo && wol) {
                    details.price = `보증금 ${bo} / 월세 ${wol}`;
                } else if (bo) {
                    details.price = `보증금 ${bo}`;
                } else {
                    details.price = `월세 ${wol}`;
                }
            }
            if (jeonyong) {
                details.area = jeonyong;
            }
        }
        return details;
    }

    function getFirstImage(content) {
        const match = content.match(/!\[.*?\]\((.*?)\)/);
        return match ? match[1] : null;
    }

    function getFallbackImage() {
        return "https://lh3.googleusercontent.com/aida-public/AB6AXuCkR-wQyhx_M0SJF0T5FH04XUIMeg6qiswo7SylZDzAmaNZvZNKh-wSI9vVX9PD3ylL4DgGtEcd9m-jU4fF9tHKVSy84-4kUI67OMbysZG-c-eZ-HNPMnu2O57NDO0AJxiPsGRrtHLH_CUoVJXqZF9XBhPBL4bFlBVSwxWLNpZySjR3UivnfVo-2scUE5413YQbsf2XE13SapJwBA4jwKU5GONGrtt6hTLhBS3CDMiaaNXF9Hn9317Qs6JQYBaTuvRjbvGd69nQyzw";
    }

    // Load and render
    try {
        const rawPosts = await getPosts();
        // Filter only properties under '매물리스트' category
        const properties = rawPosts.filter(p => p.category === '매물리스트');
        
        // Geocoding fallback with throttle delay to prevent IP bans
        const delay = ms => new Promise(res => setTimeout(res, ms));
        
        for (let post of properties) {
            const parsedDetails = parsePropertyDetails(post.content);
            const firstImage = getFirstImage(post.content) || getFallbackImage();
            
            let coords = post.coordinates;
            if ((!coords || coords.length !== 2) && post.address) {
                // Try Nominatim geocoding with 800ms spacing
                await delay(800);
                coords = await geocodeAddress(post.address);
            }
            
            if (coords && coords.length === 2) {
                allProperties.push({
                    id: post.id,
                    title: post.title,
                    address: post.address,
                    coordinates: coords,
                    price: parsedDetails.price,
                    area: parsedDetails.area,
                    parking: parsedDetails.parking,
                    image: firstImage,
                    original: post
                });
            }
        }
        
        // Render initial UI state
        activeProperties = allProperties;
        renderListAndMarkers(allProperties);
        
        // Center map bounding box to cover all loaded markers
        if (allProperties.length > 0) {
            if (allProperties.length === 1) {
                editorMap.setView(allProperties[0].coordinates, 15);
            } else {
                const bounds = L.latLngBounds(allProperties.map(p => p.coordinates));
                editorMap.fitBounds(bounds, { padding: [50, 50] });
            }
        }
        
    } catch (e) {
        console.error("Failed to load map listings", e);
        document.getElementById('property-list').innerHTML = `
            <div class="text-center py-xxl text-error">
                <span class="material-symbols-outlined text-3xl mb-sm">error</span>
                <p class="text-sm font-semibold">매물을 불러오는 도중 오류가 발생했습니다.</p>
            </div>
        `;
    }

    // Rendering Function
    function renderListAndMarkers(listings) {
        // 1. Update List Count
        document.getElementById('list-count').innerText = listings.length;
        
        // 2. Clear previous markers from Leaflet map
        markersMap.forEach(m => editorMap.removeLayer(m));
        markersMap.clear();
        
        // 3. Render list panel cards
        const container = document.getElementById('property-list');
        if (listings.length === 0) {
            container.innerHTML = `
                <div class="text-center py-xxl text-muted text-sm">
                    검색 결과와 매칭되는 매물이 없습니다.
                </div>
            `;
            return;
        }
        
        container.innerHTML = '';
        listings.forEach(item => {
            // Render card
            const card = document.createElement('div');
            card.className = "bg-surface-container-lowest rounded-xl border border-hairline shadow-card-soft overflow-hidden hover:shadow-strong-elevated cursor-pointer transition-all duration-300 flex flex-row h-28 group relative";
            card.innerHTML = `
                <div class="w-28 h-full overflow-hidden shrink-0 relative bg-surface-container-high">
                    <img src="${item.image}" alt="${item.title}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300">
                </div>
                <div class="p-sm flex-1 flex flex-col justify-between min-w-0">
                    <div class="flex flex-col gap-xs min-w-0">
                        <h4 class="font-bold text-ink text-sm truncate group-hover:text-primary transition-colors">${item.title}</h4>
                        <p class="text-[11px] text-muted truncate">${item.address}</p>
                    </div>
                    <div class="flex flex-wrap gap-xs shrink-0">
                        <span class="bg-primary-container/10 text-primary-container px-2 py-0.5 rounded text-[10px] font-bold">${item.price}</span>
                        <span class="bg-dark-chip text-white px-2 py-0.5 rounded text-[10px] font-semibold">${item.area}</span>
                    </div>
                </div>
            `;
            
            // Card click behavior: center map and trigger popup
            card.onclick = () => {
                // If on mobile, slide to map panel
                if (window.innerWidth < 768) {
                    listPanel.classList.add('hidden');
                    mapPanel.classList.remove('hidden');
                    setTimeout(() => {
                        editorMap.invalidateSize();
                        centerAndPopup(item);
                    }, 150);
                } else {
                    centerAndPopup(item);
                }
            };
            container.appendChild(card);
            
            // 4. Create Leaflet Marker with Custom Label popup
            const marker = L.marker(item.coordinates, { icon: customIcon }).addTo(editorMap);
            
            const popupHtml = `
                <div class="flex flex-col overflow-hidden bg-surface-container-lowest">
                    <div class="w-full aspect-video overflow-hidden bg-surface-container-high">
                        <img src="${item.image}" alt="${item.title}" class="w-full h-full object-cover">
                    </div>
                    <div class="p-md flex flex-col gap-sm">
                        <div class="flex flex-col gap-xs">
                            <span class="bg-primary-container/10 text-primary-container w-fit px-2 py-0.5 rounded text-[10px] font-bold">${item.price}</span>
                            <h4 class="font-bold text-ink text-sm leading-tight">${item.title}</h4>
                            <p class="text-[11px] text-muted mt-xs leading-normal">${item.address}</p>
                        </div>
                        <a href="news-detail.html?id=${item.id}" class="w-full bg-primary hover:bg-blue-mid text-white font-button text-xs py-2 rounded text-center transition-colors shadow-button-strong block no-underline">
                            상세보기
                        </a>
                    </div>
                </div>
            `;
            
            marker.bindPopup(popupHtml, {
                maxWidth: 260,
                closeButton: true
            });
            
            markersMap.set(item.id, marker);
        });
    }

    function centerAndPopup(item) {
        const marker = markersMap.get(item.id);
        if (marker) {
            editorMap.flyTo(item.coordinates, 16);
            marker.openPopup();
        }
    }

    // 5. Search filtering logic
    const searchInput = document.getElementById('search-input');
    searchInput.addEventListener('input', () => {
        const query = searchInput.value.toLowerCase().trim();
        if (!query) {
            activeProperties = allProperties;
            renderListAndMarkers(allProperties);
            return;
        }
        const filtered = allProperties.filter(p => 
            p.title.toLowerCase().includes(query) || 
            p.address.toLowerCase().includes(query) ||
            p.price.toLowerCase().includes(query)
        );
        activeProperties = filtered;
        renderListAndMarkers(filtered);
    });
});
</script>
</body>
</html>
